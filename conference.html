<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conference Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ============ TOP NAV ============ -->
  <nav class="conf-nav">
    <a href="index.html" class="conf-nav-back">&larr; Back to main explorer</a>
  </nav>

  <!-- ============ CONFERENCE HEADER ============ -->
  <header class="conf-hero">
    <p class="eyebrow" id="conf-rank-label">Conference Profile</p>
    <h1 id="conf-title">Loading&hellip;</h1>
    <p class="dek" id="conf-summary"></p>
  </header>

  <main>
    <!-- This area is intentionally a skeleton. Sections get filled in
         as data is added. Each section below is a labeled placeholder. -->

    <section class="conf-section">
      <h2>Overview</h2>
      <div class="conf-placeholder" id="section-overview">
        <p>Overview content coming soon.</p>
      </div>
    </section>

    <section class="conf-section">
      <h2>Teams</h2>
      <div class="conf-placeholder" id="section-teams">
        <p>Team listing coming soon.</p>
      </div>
    </section>

    <section class="conf-section">
      <h2>Conference Shot Profile</h2>
      <div class="conf-placeholder" id="section-profile">
        <p>Shot profile visualizations coming soon.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Built with D3.js &middot; <a href="index.html">Return to main explorer</a></p>
  </footer>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="conference.js"></script>
</body>
</html>
